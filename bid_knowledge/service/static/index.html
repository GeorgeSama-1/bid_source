<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>解析结果浏览器</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          Inter, "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        color: #1f2933;
        background: #f6f8fb;
      }
      .app {
        display: grid;
        grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
        min-height: 100vh;
      }
      aside {
        border-right: 1px solid #d8dee8;
        background: #ffffff;
        overflow: auto;
      }
      main {
        overflow: auto;
        padding: 20px 24px 40px;
      }
      .toolbar {
        position: sticky;
        top: 0;
        z-index: 2;
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 14px;
        border-bottom: 1px solid #d8dee8;
        background: #ffffff;
      }
      select,
      button {
        height: 34px;
        border: 1px solid #c8d0dc;
        border-radius: 6px;
        background: #ffffff;
        color: #1f2933;
      }
      select {
        min-width: 190px;
        padding: 0 10px;
      }
      button {
        padding: 0 10px;
        cursor: pointer;
      }
      .tree {
        padding: 10px 8px 24px;
        font-size: 14px;
      }
      .tree ul {
        list-style: none;
        margin: 0;
        padding-left: 14px;
      }
      .tree li {
        margin: 2px 0;
      }
      .tree button {
        width: 100%;
        height: auto;
        min-height: 28px;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 6px;
        border: 0;
        background: transparent;
        text-align: left;
        line-height: 1.35;
      }
      .tree button:hover,
      .tree button.active {
        background: #eef4ff;
      }
      .tree .material {
        color: #0f5c8f;
        font-weight: 600;
      }
      .header {
        margin-bottom: 18px;
      }
      .header h1 {
        margin: 0 0 8px;
        font-size: 22px;
        line-height: 1.3;
      }
      .muted {
        color: #697586;
        font-size: 13px;
      }
      details.item {
        margin: 10px 0;
        border: 1px solid #d8dee8;
        border-radius: 8px;
        background: #ffffff;
      }
      details.item summary {
        cursor: pointer;
        padding: 12px 14px;
        font-weight: 650;
        line-height: 1.45;
      }
      .item-body {
        border-top: 1px solid #eef1f5;
        padding: 12px 14px 16px;
      }
      .text {
        white-space: pre-wrap;
        line-height: 1.7;
      }
      img.preview {
        display: block;
        max-width: 100%;
        max-height: 760px;
        border: 1px solid #d8dee8;
        border-radius: 6px;
        background: #ffffff;
      }
      pre {
        overflow: auto;
        margin: 0;
        padding: 12px;
        border-radius: 6px;
        background: #f2f5f9;
        line-height: 1.55;
      }
      table {
        border-collapse: collapse;
        max-width: 100%;
        overflow: auto;
        background: #ffffff;
      }
      td,
      th {
        border: 1px solid #d8dee8;
        padding: 6px 8px;
        vertical-align: top;
      }
      .empty,
      .error {
        padding: 18px;
        border: 1px dashed #c8d0dc;
        border-radius: 8px;
        background: #ffffff;
      }
      .error {
        color: #9b1c1c;
      }
      @media (max-width: 820px) {
        .app {
          grid-template-columns: 1fr;
        }
        aside {
          max-height: 42vh;
          border-right: 0;
          border-bottom: 1px solid #d8dee8;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside>
        <div class="toolbar">
          <select id="runSelect" aria-label="run"></select>
          <button id="refreshButton" type="button">刷新</button>
        </div>
        <div id="tree" class="tree"></div>
      </aside>
      <main>
        <div class="header">
          <h1 id="title">解析结果浏览器</h1>
          <div id="subtitle" class="muted">请选择左侧材料目录</div>
        </div>
        <div id="content" class="empty">只读取 outputs 中已有结果，不启动解析任务。</div>
      </main>
    </div>
    <script>
      const state = {
        run: "",
        selectedPath: "",
      };

      const runSelect = document.querySelector("#runSelect");
      const refreshButton = document.querySelector("#refreshButton");
      const treeRoot = document.querySelector("#tree");
      const title = document.querySelector("#title");
      const subtitle = document.querySelector("#subtitle");
      const content = document.querySelector("#content");

      function api(url) {
        return fetch(url).then(async (response) => {
          if (!response.ok) {
            const body = await response.text();
            throw new Error(body || response.statusText);
          }
          return response.json();
        });
      }

      function esc(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function setError(message) {
        content.className = "error";
        content.textContent = message;
      }

      async function loadRuns() {
        const data = await api("/api/runs");
        runSelect.innerHTML = "";
        for (const run of data.runs) {
          const option = document.createElement("option");
          option.value = run.name;
          option.textContent = run.name;
          runSelect.appendChild(option);
        }
        state.run = runSelect.value || "";
        if (!state.run) {
          treeRoot.innerHTML = "";
          setError("未找到 outputs/<run>/modules 目录。");
          return;
        }
        await loadTree();
      }

      async function loadTree() {
        const tree = await api(`/api/runs/${encodeURIComponent(state.run)}/modules/tree`);
        treeRoot.innerHTML = "";
        treeRoot.appendChild(renderTreeNode(tree));
      }

      function renderTreeNode(node) {
        const wrapper = document.createElement("ul");
        const li = document.createElement("li");
        const button = document.createElement("button");
        button.type = "button";
        button.className = node.is_material ? "material" : "";
        button.textContent = `${node.children?.length ? "▾" : "•"} ${node.name}`;
        button.title = node.path || node.name;
        if (node.is_material) {
          button.addEventListener("click", () => selectMaterial(node.path, button));
        }
        li.appendChild(button);
        if (node.children?.length) {
          const children = document.createElement("ul");
          for (const child of node.children) {
            children.append(...renderTreeNode(child).children);
          }
          li.appendChild(children);
        }
        wrapper.appendChild(li);
        return wrapper;
      }

      async function selectMaterial(materialPath, button) {
        state.selectedPath = materialPath;
        document.querySelectorAll(".tree button.active").forEach((node) => node.classList.remove("active"));
        button.classList.add("active");
        content.className = "empty";
        content.textContent = "读取中...";
        try {
          const [meta, ordered] = await Promise.all([
            api(`/api/runs/${encodeURIComponent(state.run)}/materials/meta?path=${encodeURIComponent(materialPath)}`),
            api(`/api/runs/${encodeURIComponent(state.run)}/materials/ordered?path=${encodeURIComponent(materialPath)}`),
          ]);
          title.textContent = meta.material_title || ordered.material_title || materialPath.split("/").at(-1);
          subtitle.textContent = meta.section_path || ordered.section_path || materialPath;
          renderItems(ordered.items || []);
        } catch (error) {
          setError(error.message);
        }
      }

      function itemTitle(item, index) {
        const page = item.page_no ? ` · p.${item.page_no}` : "";
        const name =
          item.text ||
          item.table_title ||
          item.image_title ||
          item.title ||
          item.material_title ||
          item.type;
        return `${index + 1}. ${item.type}${page} · ${String(name).slice(0, 90)}`;
      }

      function renderItems(items) {
        content.className = "";
        content.innerHTML = "";
        if (!items.length) {
          content.className = "empty";
          content.textContent = "该材料没有 ordered items。";
          return;
        }
        items.forEach((item, index) => {
          const details = document.createElement("details");
          details.className = "item";
          if (index < 3) details.open = true;
          details.innerHTML = `<summary>${esc(itemTitle(item, index))}</summary>`;
          const body = document.createElement("div");
          body.className = "item-body";
          body.appendChild(renderItemBody(item));
          details.appendChild(body);
          content.appendChild(details);
        });
      }

      function renderItemBody(item) {
        if (item.type === "text") {
          const div = document.createElement("div");
          div.className = "text";
          div.textContent = item.text || item.content || JSON.stringify(item, null, 2);
          return div;
        }
        if (item.type === "image" && item.preview_url) {
          const wrap = document.createElement("div");
          const image = document.createElement("img");
          image.className = "preview";
          image.src = item.preview_url;
          image.alt = item.image_title || "image";
          wrap.appendChild(image);
          wrap.appendChild(renderJson(item));
          return wrap;
        }
        if (item.type === "table" && item.detail_item_name) {
          const wrap = document.createElement("div");
          wrap.textContent = "读取表格中...";
          loadDetail(item, item.detail_item_name).then((detail) => {
            wrap.innerHTML = "";
            wrap.appendChild(renderTableOrJson(detail));
          }).catch((error) => {
            wrap.textContent = error.message;
          });
          return wrap;
        }
        if (item.type === "submaterial" && item.target_material_path) {
          const button = document.createElement("button");
          button.type = "button";
          button.textContent = "进入子材料";
          button.addEventListener("click", () => {
            title.textContent = item.title || item.material_title || "子材料";
            selectMaterial(item.target_material_path, button);
          });
          return button;
        }
        return renderJson(item);
      }

      function loadDetail(item, itemName) {
        const params = new URLSearchParams({
          material_path: state.selectedPath,
          item_type: item.type,
          item_name: itemName,
        });
        return api(`/api/runs/${encodeURIComponent(state.run)}/items/detail?${params.toString()}`);
      }

      function renderTableOrJson(detail) {
        if (Array.isArray(detail.rows) && detail.rows.length) {
          const table = document.createElement("table");
          detail.rows.forEach((row) => {
            const tr = document.createElement("tr");
            row.forEach((cell) => {
              const td = document.createElement("td");
              td.textContent = cell ?? "";
              tr.appendChild(td);
            });
            table.appendChild(tr);
          });
          return table;
        }
        return renderJson(detail);
      }

      function renderJson(value) {
        const pre = document.createElement("pre");
        pre.textContent = JSON.stringify(value, null, 2);
        return pre;
      }

      runSelect.addEventListener("change", async () => {
        state.run = runSelect.value;
        state.selectedPath = "";
        title.textContent = "解析结果浏览器";
        subtitle.textContent = "请选择左侧材料目录";
        await loadTree().catch((error) => setError(error.message));
      });
      refreshButton.addEventListener("click", () => loadRuns().catch((error) => setError(error.message)));

      loadRuns().catch((error) => setError(error.message));
    </script>
  </body>
</html>
